    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/isotope-layout@3/dist/isotope.pkgd.min.js"></script>
    <script src="assets/js/main.js"></script>

    <script>
        $(document).ready(function() {
            // Isotope Setup
            var $grid = $('.grid').isotope({
                itemSelector: '.grid-item',
                layoutMode: 'fitRows'
            });

            // Unified Filter Logic
            function applyFilters() {
                var loc = $('#locFilter').val();
                var stage = $('#stageFilter').val();
                var type = $('#typeFilter').val();
                var search = $('#nameSearch').val().toLowerCase();

                var filterConcat = '';
                if(loc !== '*') filterConcat += loc;
                if(stage !== '*') filterConcat += stage;
                if(type !== '*') filterConcat += type;

                $grid.isotope({
                    filter: function() {
                        var isMatched = true;
                        if(filterConcat !== '') {
                            isMatched = $(this).is(filterConcat);
                        }
                        var name = $(this).find('h4').text().toLowerCase();
                        return isMatched && name.indexOf(search) !== -1;
                    }
                });
            }

            $('.filter-control').on('change keyup', applyFilters);

            // Sticky Nav & Reveal
            $(window).scroll(function() {
                if ($(this).scrollTop() > 100) $('#mainNav').addClass('sticky');
                else $('#mainNav').removeClass('sticky');

                $('.reveal').each(function() {
                    var bottom_of_window = $(window).scrollTop() + $(window).height();
                    if (bottom_of_window > $(this).offset().top + 100) {
                        $(this).addClass('active');
                    }
                });
            });
        });
    </script>
